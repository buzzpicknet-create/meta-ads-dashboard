kind = "web"
previewPath = "/ads/"
title = "Google Ads Dashboard"
version = "1.0.0"
id = "artifacts/ads-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/ads/" ]
localPort = 20660

[services.development]
run = "pnpm --filter @workspace/ads-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ads-dashboard", "run", "build" ]
publicDir = "artifacts/ads-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20660"
BASE_PATH = "/ads/"
